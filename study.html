
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Mode - Nona Plan</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background-image: url('background.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
    min-height: calc(100vh + 1200px);
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    z-index: -1;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(0,0,0,0.6);
}

.logo img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ffd700;
    box-shadow: 0 0 8px #ffd70080;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: white;
    cursor: pointer;
}

.nav-links a:hover {
    color: #ffd700;
}

/* TIMER */
.timer-box {
    text-align: center;
    margin: 20px auto;
    max-width: 500px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 12px;
}

#time {
    font-size: 2rem;
    font-weight: bold;
    color: #ffd700;
    margin-bottom: 10px;
}

.timer-controls button {
    margin: 5px;
    padding: 10px 15px;
    background: #ffd700;
    color: black;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

/* VIEWER */
.viewer {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 70vh;
    background: rgba(0,0,0,0.4);
    border: 2px solid #ffd700;
    border-radius: 10px;
    resize: both;
    overflow: hidden;
    cursor: grab;
    z-index: 999;
}

.viewer iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.viewer::after {
    content: "";
    width: 15px;
    height: 15px;
    background: #ffd700;
    position: absolute;
    bottom: 5px;
    right: 5px;
    border-radius: 3px;
    cursor: se-resize;
}

/* DRAG SHIELD */
#dragShield {
    position: fixed;
    width: 100vw;
    height: 100vh;
    display: none;
    z-index: 9999;
    cursor: move;
}

/* SNAP BUTTON */
#snapCenterBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    background: #ffd700;
    color: black;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    z-index: 9999;
}

/* FOCUS MODE */
.focus { background: #000 !important; }
.hide { display: none !important; }

#exitFocusBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    display: none;
    padding: 10px 15px;
    background: #ffd700;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

.show { display: block !important; }

.footer {
    text-align: center;
    padding: 15px;
    margin-top: 40px;
    background: rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="overlay"></div>

<nav class="navbar">
  <div class="logo">
    <img src="logo.png">
  </div>

  <ul class="nav-links">
    <li><a href="resources.html">Back to Resources</a></li>
    <li><a onclick="toggleFocus()">Focus Mode</a></li>
  </ul>
</nav>

<button id="exitFocusBtn" onclick="toggleFocus()">Exit Focus</button>

<div class="timer-box" id="timerBox">
    <h2>⏱ Study Timer</h2>
    <div id="time">00:00</div>

    <div class="timer-controls">
        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
        <button onclick="finishStudy()">Finish</button>
    </div>
</div>

<div class="viewer" id="viewerBox">
    <iframe id="viewer"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>
</div>

<button id="snapCenterBtn" onclick="snapToCenter()">Snap to Center</button>

<div id="dragShield"></div>

<footer class="footer">
    <p>© 2026 Nona Plan</p>
</footer>

<script>
// LOAD RESOURCE
const params = new URLSearchParams(window.location.search);
const file = params.get("file");
const video = params.get("video");

const viewer = document.getElementById("viewer");

if (video) {
    viewer.src = video;
} else if (file) {
    viewer.src = file + "#zoom=page-width&toolbar=1";
}

// TIMER
let startTime = null;
let interval = null;
let elapsedSeconds = 0;

function updateDisplay() {
    let min = Math.floor(elapsedSeconds / 60);
    let sec = elapsedSeconds % 60;
    document.getElementById("time").textContent =
        String(min).padStart(2, '0') + ":" +
        String(sec).padStart(2, '0');
}

function startTimer() {
    if (!interval) {
        startTime = Date.now() - (elapsedSeconds * 1000);
        interval = setInterval(() => {
            elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
            updateDisplay();
        }, 1000);
    }
}

function pauseTimer() {
    clearInterval(interval);
    interval = null;
}

function resetTimer() {
    pauseTimer();
    elapsedSeconds = 0;
    updateDisplay();
}

// SAVE SESSION (✅ FIXED)
function finishStudy() {
    pauseTimer();
    if (elapsedSeconds < 10) return alert("Too short!");

    let sessions = JSON.parse(localStorage.getItem("studySessions") || "[]");

    sessions.push({
        subject: params.get("subject") || "Unknown",
        resource: file || video,
        duration: Math.floor(elapsedSeconds / 60), // ✅ correct property
        date: new Date().toISOString()
    });

    localStorage.setItem("studySessions", JSON.stringify(sessions));
    alert("Saved!");
    window.location.href = "planner.html";
}

// FOCUS MODE
function toggleFocus() {
    document.body.classList.toggle("focus");
    document.getElementById("timerBox").classList.toggle("hide");
    document.querySelector(".navbar").classList.toggle("hide");
    document.getElementById("exitFocusBtn").classList.toggle("show");
}

// POSITION UNDER TIMER
const viewerBox = document.getElementById("viewerBox");

function positionViewer() {
    const timer = document.getElementById("timerBox");
    viewerBox.style.top = (timer.offsetTop + timer.offsetHeight + 20) + "px";
}

window.addEventListener("load", positionViewer);
window.addEventListener("resize", positionViewer);

// DRAGGING
const dragShield = document.getElementById("dragShield");

let isDragging = false, offsetX = 0;

viewerBox.addEventListener("mousedown", (e) => {
    if (e.target === viewerBox) {
        isDragging = true;
        viewerBox.style.cursor = "move";
        dragShield.style.display = "block";
        offsetX = e.clientX - viewerBox.offsetLeft;
    }
});

document.addEventListener("mousemove", (e) => {
    if (isDragging) {
        let newLeft = e.clientX - offsetX;
        const maxX = window.innerWidth - viewerBox.offsetWidth;
        newLeft = Math.max(0, Math.min(newLeft, maxX));
        viewerBox.style.left = newLeft + "px";
        positionViewer();
    }
});

document.addEventListener("mouseup", () => {
    isDragging = false;
    viewerBox.style.cursor = "default";
    dragShield.style.display = "none";
});

// SNAP TO CENTER
function snapToCenter() {
    viewerBox.style.left = "50%";
    viewerBox.style.transform = "translateX(-50%)";
}
</script>

</body>
</html>
