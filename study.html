<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Mode - Nona Plan</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

html, body {
    height: 100%;
}

body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;   /* ensures tall vertical page */
    background-image: url('background.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    z-index: -1;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(0,0,0,0.6);
}

.logo img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ffd700;
    box-shadow: 0 0 8px #ffd70080;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: white;
    cursor: pointer;
}

.nav-links a:hover {
    color: #ffd700;
}

/* TIMER */
.timer-box {
    text-align: center;
    margin: 20px auto;
    max-width: 500px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 12px;
}

#time {
    font-size: 2rem;
    font-weight: bold;
    color: #ffd700;
    margin-bottom: 10px;
}

.timer-controls button {
    margin: 5px;
    padding: 10px 15px;
    background: #ffd700;
    color: black;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

/* VIEWER */
.viewer {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 70vh;
    background: rgba(0,0,0,0.4);
    border: 2px solid #ffd700;
    border-radius: 10px;
    resize: both;
    overflow: hidden;
    cursor: default;
}

.viewer iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.viewer::after {
    content: "";
    width: 15px;
    height: 15px;
    background: #ffd700;
    position: absolute;
    bottom: 5px;
    right: 5px;
    border-radius: 3px;
    cursor: se-resize;
}

/* DRAG SHIELD */
#dragShield {
    position: fixed;
    width: 100vw;
    height: 100vh;
    display: none;
    z-index: 9999;
    cursor: move;
}

/* FOCUS MODE */
.focus { background: #000 !important; }
.hide { display: none !important; }

#exitFocusBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    display: none;
    padding: 10px 15px;
    background: #ffd700;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

.show { display: block !important; }

/* FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    background: rgba(0,0,0,0.5);
    margin-top: auto; /* pushes footer to bottom */
}
</style>
</head>

<body>

<div class="overlay"></div>

<nav class="navbar">
  <div class="logo">
    <img src="logo.png">
  </div>

  <ul class="nav-links">
    <li><a href="resources.html">Back to Resources</a></li>
    <li><a onclick="toggleFocus()">Focus Mode</a></li>
  </ul>
</nav>

<button id="exitFocusBtn" onclick="toggleFocus()">Exit Focus</button>

<main>
  <div class="timer-box" id="timerBox">
      <h2>⏱ Study Timer</h2>
      <div id="time">00:00</div>

      <div class="timer-controls">
          <button onclick="startTimer()">Start</button>
          <button onclick="pauseTimer()">Pause</button>
          <button onclick="resetTimer()">Reset</button>
          <button onclick="finishStudy()">Finish</button>
      </div>
  </div>

  <div class="viewer">
      <iframe id="viewer"></iframe>
  </div>

  <!-- ⭐ QUIZ SECTION ⭐ -->
  <div id="quizBox" style="
      width: 900px;
      margin: 30px auto;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border: 2px solid #ffd700;
      border-radius: 10px;
  ">
      <h2 style="color:#ffd700; margin-bottom:10px;">Quick Quiz</h2>

      <p id="quizQuestion">What is 5 + 7?</p>

      <input id="quizAnswer" type="text" 
          style="width:100%; padding:10px; margin-top:10px; border-radius:6px; border:none;">

      <button onclick="submitQuiz()" 
          style="margin-top:15px; padding:10px 15px; background:#ffd700; color:black; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">
          Submit Answer
      </button>

      <p id="quizFeedback" style="margin-top:10px; font-weight:bold;"></p>
  </div>
  <!-- ⭐ END QUIZ SECTION ⭐ -->

  <div id="dragShield"></div>
</main>

<footer class="footer">
    <p>© 2026 Nona Plan</p>
</footer>

<script>
// LOAD RESOURCE
const params = new URLSearchParams(window.location.search);
const file = params.get("file");
const video = params.get("video");

const viewer = document.getElementById("viewer");

function loadViewer() {
    if (file) {
        viewer.src = file + "#zoom=page-width&toolbar=1";
    } else if (video) {
        viewer.src = video;
    }
}
loadViewer();

// TIMER
let startTime = null;
let interval = null;
let elapsedSeconds = 0;

function updateDisplay() {
    let min = Math.floor(elapsedSeconds / 60);
    let sec = elapsedSeconds % 60;
    document.getElementById("time").textContent =
        String(min).padStart(2, '0') + ":" +
        String(sec).padStart(2, '0');
}

function startTimer() {
    if (!interval) {
        startTime = Date.now() - (elapsedSeconds * 1000);
        interval = setInterval(() => {
            elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
            updateDisplay();
        }, 1000);
    }
}

function pauseTimer() { clearInterval(interval); interval = null; }
function resetTimer() { pauseTimer(); elapsedSeconds = 0; updateDisplay(); }

// ⭐ QUIZ SYSTEM ⭐
let quizCompleted = false;

const quiz = {
    question: "What is 5 + 7?",
    answer: "12"
};

document.getElementById("quizQuestion").textContent = quiz.question;

function submitQuiz() {
    const userAnswer = document.getElementById("quizAnswer").value.trim();
    const feedback = document.getElementById("quizFeedback");

    if (userAnswer === quiz.answer) {
        quizCompleted = true;
        feedback.style.color = "#00ff00";
        feedback.textContent = "Correct! Task marked as done.";
        markTaskDone();
    } else {
        feedback.style.color = "#ff4444";
        feedback.textContent = "Incorrect. Try again.";
    }
}

function markTaskDone() {
    let completed = JSON.parse(localStorage.getItem("completedTasks") || "[]");
    const resourceName = file || video || "Unknown Resource";

    if (!completed.includes(resourceName)) {
        completed.push(resourceName);
        localStorage.setItem("completedTasks", JSON.stringify(completed));
    }
}
// ⭐ END QUIZ SYSTEM ⭐

// SAVE SESSION
function finishStudy() {
    pauseTimer();

    if (!quizCompleted) {
        return alert("Please complete the quiz before finishing.");
    }

    if (elapsedSeconds < 10) return alert("Too short!");

    let sessions = JSON.parse(localStorage.getItem("studySessions") || "[]");

    sessions.push({
        subject: params.get("subject") || "Unknown",
