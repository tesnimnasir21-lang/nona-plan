<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Nona Plan</title>

<link rel="stylesheet" href="style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
    min-height: 100vh;
}

/* OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

/* NAVBAR (hidden but safe) */
.navbar {
    visibility: hidden;
}

/* LOGO STYLE */
nav .logo img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ffd700;
}

/* AUTH CONTAINER */
.auth-container {
    max-width: 420px;
    width: 90%;
    margin: 100px auto;
    padding: 30px;
    background: rgba(0,0,0,0.7);
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.auth-container h2 {
    margin-bottom: 20px;
    font-size: 28px;
}

.auth-container input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: none;
    font-size: 16px;
}

.auth-container button {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: #ffd700;
    color: black;
    transition: 0.3s;
    font-size: 16px;
}

.auth-container button:hover {
    background: #e6c200;
}

/* TOGGLE BUTTON */
#toggleMode {
    margin-top: 15px;
    background: transparent;
    color: #fff;
    text-decoration: underline;
    font-size: 14px;
    cursor: pointer;
    border: none;
}

/* ERROR TEXT */
#error {
    color: #ff6961;
    margin-bottom: 10px;
}

/* =========================
   RESPONSIVE DESIGN
========================= */

/* TABLET */
@media (max-width: 1024px) {
    .auth-container {
        margin: 80px auto;
    }
}

/* MOBILE */
@media (max-width: 768px) {

    .auth-container {
        margin: 60px auto;
        padding: 25px;
    }

    .auth-container h2 {
        font-size: 22px;
    }

    .auth-container input,
    .auth-container button {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- NAVBAR (hidden visually) -->
<nav class="navbar">
    <div class="logo">
        <img src="logo.png" alt="Nona Plan Logo">
    </div>
</nav>

<!-- AUTH FORM -->
<div class="auth-container" id="authContainer">
    <h2 id="formTitle">🔐 Login</h2>
    <p id="error"></p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="authBtn">Login</button>

    <button id="toggleMode">Don't have an account? Register</button>
</div>

<script>
// ===== Elements =====
const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const authBtn = document.getElementById("authBtn");
const toggleModeBtn = document.getElementById("toggleMode");
const errorEl = document.getElementById("error");
const formTitle = document.getElementById("formTitle");

// ===== Mode =====
let isLogin = true;

// ===== Toggle Mode =====
toggleModeBtn.addEventListener("click", () => {
    isLogin = !isLogin;

    if(isLogin){
        formTitle.textContent = "🔐 Login";
        authBtn.textContent = "Login";
        toggleModeBtn.textContent = "Don't have an account? Register";
    } else {
        formTitle.textContent = "📝 Register";
        authBtn.textContent = "Register";
        toggleModeBtn.textContent = "Already have an account? Login";
    }

    errorEl.textContent = "";
    errorEl.style.color = "#ff6961";
});

// ===== Auth Logic =====
authBtn.addEventListener("click", () => {
    const email = emailEl.value.trim();
    const password = passEl.value.trim();

    if(!email || !password){
        errorEl.textContent = "Please fill in all fields.";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users") || "{}");

    if(isLogin){
        if(users[email] && users[email] === password){
            localStorage.setItem("loggedIn", email);
            window.location.href = "planner.html";
        } else {
            errorEl.textContent = "Invalid email or password!";
        }
    } else {
        if(users[email]){
            errorEl.textContent = "Email already registered!";
        } else {
            users[email] = password;
            localStorage.setItem("users", JSON.stringify(users));

            errorEl.style.color = "#00ff99";
            errorEl.textContent = "Registration successful! You can now login.";

            isLogin = true;
            formTitle.textContent = "🔐 Login";
            authBtn.textContent = "Login";
            toggleModeBtn.textContent = "Don't have an account? Register";

            emailEl.value = "";
            passEl.value = "";
        }
    }
});

// ===== Auto Redirect =====
if(localStorage.getItem("loggedIn")){
    window.location.href = "planner.html";
}
</script>

</body>
</html>
