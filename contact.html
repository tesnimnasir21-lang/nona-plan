<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Nona Plan</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: url('background.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  min-height: 100vh;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: -1;
}

/* NAVBAR */
nav.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(0,0,0,0.7);
  position: sticky;
  top: 0;
  z-index: 100;
}

nav .logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

nav .logo img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 20px;
}

nav ul li a {
  color: #fff;
  text-decoration: none;
  font-weight: bold;
}

nav ul li a:hover,
nav ul li a.active {
  color: #ffd700;
}

/* 🔴 LOGOUT BUTTON (UNIFIED STYLE) */
.logout-btn {
  background: #ff3b30;
  color: white !important;
  padding: 8px 14px;
  border-radius: 8px;
  font-weight: bold;
  transition: 0.3s;
}

.logout-btn:hover {
  background: #c70015;
  transform: scale(1.05);
}

/* USER */
.user-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* CONTACT */
.contact {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 80px 20px;
}

.contact-content {
  background: rgba(0,0,0,0.85);
  padding: 35px;
  border-radius: 12px;
  max-width: 450px;
  width: 100%;
  text-align: center;
}

.contact-content h1 {
  margin-bottom: 15px;
  color: #ffd700;
}

.contact-content p {
  margin-bottom: 20px;
  color: #ddd;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  background: #ffd700;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

#statusMsg {
  margin-top: 10px;
  font-weight: bold;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 15px;
  background: rgba(0,0,0,0.7);
  margin-top: 40px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- NAVBAR -->
<nav class="navbar">

  <div class="logo">
    <img src="logo.png">
    <span>Nona Plan</span>
  </div>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="planner.html">Planner</a></li>
    <li><a href="analytics.html">Analytics</a></li>
    <li><a href="resources.html">Resources</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>

    <li><a href="#" class="logout-btn" onclick="logout()">Logout</a></li>
  </ul>

  <div class="user-box">
    <span id="userEmail"></span>
  </div>

</nav>

<!-- CONTACT -->
<section class="contact">
  <div class="contact-content">

    <h1>Contact Us</h1>
    <p>Send us your questions or feedback!</p>

    <form id="contactForm">
      <input type="hidden" name="access_key" value="afc2f4f0-ff3a-4a49-882d-bebfeb008d76">
      <input type="checkbox" name="botcheck" style="display:none;">

      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>
    </form>

    <p id="statusMsg"></p>

  </div>
</section>

<footer>
  <p>&copy; 2026 Nona Plan - Developed by Students</p>
</footer>

<script>
// 🔐 LOGIN CHECK
const user = localStorage.getItem("loggedIn");

if(!user){
  window.location.href = "login.html";
}

// SHOW USER
document.getElementById("userEmail").textContent = user;

// LOGOUT
function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

// FORM SUBMIT
const form = document.getElementById("contactForm");
const statusMsg = document.getElementById("statusMsg");
const button = form.querySelector("button");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);

  statusMsg.textContent = "⏳ Sending...";
  button.disabled = true;

  try {
    const response = await fetch("https://api.web3forms.com/submit", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    if (response.ok) {
      statusMsg.textContent = "✅ Message sent successfully!";
      form.reset();
    } else {
      statusMsg.textContent = "❌ " + data.message;
    }

  } catch (error) {
    statusMsg.textContent = "❌ Something went wrong.";
  }

  button.disabled = false;
});
</script>

</body>
</html>
