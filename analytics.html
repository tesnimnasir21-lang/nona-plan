<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nona Plan - Analytics</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background-image: url('background.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
}

/* OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    z-index: -1;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 60px;
    flex-wrap: wrap;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* LOGO */
nav .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

nav .logo img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ffd700;
}

/* NAV LINKS */
.nav-links {
    list-style: none;
    display: flex;
    gap: 22px;
    align-items: center;
    flex-wrap: wrap;
}

.nav-links a {
    text-decoration: none;
    color: white;
    font-size: 16px;
    transition: 0.3s;
    padding: 6px 10px;
    border-radius: 6px;
}

.nav-links a:hover,
.nav-links a.active {
    color: #ffd700;
    background: rgba(255, 215, 0, 0.1);
}

/* LOGOUT BUTTON (MORE VISIBLE) */
.logout-btn {
    background: #ff2d2d;
    color: white !important;
    padding: 8px 14px;
    border-radius: 10px;
    font-weight: bold;
    box-shadow: 0 0 10px rgba(255,0,0,0.4);
}

.logout-btn:hover {
    background: #c40000;
    transform: scale(1.05);
}

/* HEADER */
.header {
    text-align: center;
    padding: 60px 20px 30px;
}

.header h1 {
    font-size: 55px;
    margin-bottom: 10px;
}

.header p {
    font-size: 20px;
    opacity: 0.9;
}

/* SECTIONS */
.section {
    max-width: 1100px;
    margin: 40px auto;
    background: rgba(0,0,0,0.55);
    padding: 25px;
    border-radius: 12px;
}

.section h2 {
    margin-bottom: 15px;
    color: #ffd700;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    justify-content: center;
}

/* CARDS */
.card {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    width: 230px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    background: rgba(0,0,0,0.75);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    margin-top: 40px;
    background: rgba(0,0,0,0.5);
}

/* ================= RESPONSIVE ================= */

/* TABLET */
@media (max-width: 1024px) {
    .navbar {
        padding: 15px 25px;
    }

    .header h1 {
        font-size: 42px;
    }
}

/* MOBILE */
@media (max-width: 768px) {

    .navbar {
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 15px;
    }

    .nav-links {
        justify-content: center;
        gap: 10px;
    }

    .header h1 {
        font-size: 32px;
    }

    .header p {
        font-size: 16px;
    }

    .section {
        margin: 20px 10px;
        padding: 18px;
    }

    .card {
        width: 100%;
        max-width: 320px;
    }
}

/* SMALL MOBILE */
@media (max-width: 480px) {

    .nav-links {
        flex-direction: column;
        gap: 8px;
    }

    .header h1 {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="index.html" class="logo">
        <img src="logo.png" alt="Logo">
        Nona Plan
    </a>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="analytics.html" class="active">Analytics</a></li>
        <li><a href="resources.html">Resources</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="#" class="logout-btn" onclick="logout()">Logout</a></li>
    </ul>
</nav>

<!-- HEADER -->
<section class="header">
    <h1>📊 Study Analytics</h1>
    <p>Your real study activity from Study Mode</p>
</section>

<!-- OVERVIEW -->
<div class="section">
    <h2>Overview</h2>
    <div class="grid">
        <div class="card"><h3>Total Study Time</h3><p id="totalTime">0 min</p></div>
        <div class="card"><h3>Total Sessions</h3><p id="totalSessions">0</p></div>
        <div class="card"><h3>Average Session</h3><p id="avgSession">0 min</p></div>
    </div>
</div>

<!-- SUBJECTS -->
<div class="section">
    <h2>Subjects Breakdown</h2>
    <div class="grid" id="subjectGrid"></div>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Nona Plan | Designed for students</p>
</footer>

<script>
function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}

let studySessions = JSON.parse(localStorage.getItem("studySessions")) || [];

let totalMinutes = studySessions.reduce((sum, s) => sum + (s.duration || 0), 0);
document.getElementById("totalTime").textContent = totalMinutes + " min";

document.getElementById("totalSessions").textContent = studySessions.length;

let avg = studySessions.length ? Math.round(totalMinutes / studySessions.length) : 0;
document.getElementById("avgSession").textContent = avg + " min";

let subjectTotals = {};

studySessions.forEach(s => {
    let subject = s.subject || "Unknown";
    subjectTotals[subject] = (subjectTotals[subject] || 0) + (s.duration || 0);
});

let subjectGrid = document.getElementById("subjectGrid");
subjectGrid.innerHTML = "";

if (studySessions.length === 0) {
    subjectGrid.innerHTML = "<p>No data yet. Start studying!</p>";
} else {
    for (let subject in subjectTotals) {
        let box = document.createElement("div");
        box.className = "card";
        box.innerHTML = `<h3>${subject}</h3><p>${subjectTotals[subject]} min</p>`;
        subjectGrid.appendChild(box);
    }
}
</script>

</body>
</html>
