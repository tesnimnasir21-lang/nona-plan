
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nona Plan - Analytics</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background-image: url('background.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    z-index: -1;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
}

nav .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 28px;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

nav .logo img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ffd700;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: white;
    font-size: 16px;
    transition: 0.3s;
}

.nav-links a:hover,
.nav-links a.active {
    color: #ffd700;
}

.header {
    text-align: center;
    padding: 50px 20px;
}

.header h1 {
    font-size: 55px;
    margin-bottom: 10px;
}

.header p {
    font-size: 20px;
}

.section {
    max-width: 1100px;
    margin: 40px auto;
    background: rgba(0,0,0,0.55);
    padding: 25px;
    border-radius: 12px;
}

.section h2 {
    margin-bottom: 15px;
    color: #ffd700;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    justify-content: center;
}

.card {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    width: 230px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    background: rgba(0,0,0,0.75);
}

footer {
    text-align: center;
    padding: 20px;
    margin-top: 40px;
    background: rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="overlay"></div>

<nav class="navbar">
    <a href="index.html" class="logo">
        <img src="logo.png" alt="Logo">
        Nona Plan
    </a>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="analytics.html" class="active">Analytics</a></li>
        <li><a href="resources.html">Resources</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<section class="header">
    <h1>📊 Study Analytics</h1>
    <p>Your real study activity from Study Mode</p>
</section>

<div class="section">
    <h2>Overview</h2>
    <div class="grid">
        <div class="card"><h3>Total Study Time</h3><p id="totalTime">0 min</p></div>
        <div class="card"><h3>Total Sessions</h3><p id="totalSessions">0</p></div>
        <div class="card"><h3>Average Session</h3><p id="avgSession">0 min</p></div>
    </div>
</div>

<div class="section">
    <h2>Subjects Breakdown</h2>
    <div class="grid" id="subjectGrid"></div>
</div>

<footer>
    <p>© 2026 Nona Plan | Designed for students</p>
</footer>

<script>
// LOAD DATA
let studySessions = JSON.parse(localStorage.getItem("studySessions")) || [];

// TOTAL TIME
let totalMinutes = studySessions.reduce((sum, s) => sum + (s.duration || 0), 0);
document.getElementById("totalTime").textContent = totalMinutes + " min";

// TOTAL SESSIONS
document.getElementById("totalSessions").textContent = studySessions.length;

// AVERAGE
let avg = studySessions.length ? Math.round(totalMinutes / studySessions.length) : 0;
document.getElementById("avgSession").textContent = avg + " min";

// SUBJECT BREAKDOWN
let subjectTotals = {};

studySessions.forEach(s => {
    let subject = s.subject || "Unknown";
    subjectTotals[subject] = (subjectTotals[subject] || 0) + (s.duration || 0);
});

// RENDER SUBJECTS
let subjectGrid = document.getElementById("subjectGrid");
subjectGrid.innerHTML = "";

if (studySessions.length === 0) {
    subjectGrid.innerHTML = "<p>No data yet. Start studying!</p>";
} else {
    for (let subject in subjectTotals) {
        let box = document.createElement("div");
        box.className = "card";
        box.innerHTML = `<h3>${subject}</h3><p>${subjectTotals[subject]} min</p>`;
        subjectGrid.appendChild(box);
    }
}
</script>

</body>
</html>
